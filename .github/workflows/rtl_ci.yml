name: RTL Hardware Verification

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  simulate_cache:
    runs-on: self-hosted 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Icarus Verilog
        run: |
          sudo yum update -y
          sudo yum install -y iverilog

      - name: Run Python Verification Script
        run: python3 scripts/run_and_parse.py
